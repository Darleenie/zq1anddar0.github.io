<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome WIFI Password: zq1anddar0</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Home" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- In your HTML page -->
  <section>
    <div id="nav-placeholder"></div>
  </section>

  <section class="section welcome">
    <img src="assets/wifi.png" alt="WiFi Password: zq1anddar0 /n Welcome" />
  </section>

  <!-- Alexa Commands -->
  <section class="section">
    <h2 class="h2">Alexa Command List</h2>
    <ul class="ul">
      <li>"Alexa, bright the room"</li>
      <li>"Alexa, meal time"</li>
      <li>"Alexa, I'm leaving"</li>
      <li>"Alexa, good night"</li>
    </ul>
  </section>

  <section class="section find-stuff">
    <h2>Find My Stuff</h2>
    <div id="home-notif-badge" class="home-notif-badge" style="display:none"></div>
    <input type="text" id="itemInput" placeholder="Enter item name" />
    <div class="find-stuff-btns">
      <button onclick="searchItem()">Search</button>
      <a href="pages/search.html" class="btn-view-all">View All Items</a>
    </div>
  </section>

  <section class="section zq1-room room " onclick="navigateTo('pages/zq1.html')">
    <h2>zq1's Room</h2>
  </section>

  <section class=" section dar0-room room" onclick="navigateTo('pages/dar0.html')">
    <h2>dar0's Room</h2>
  </section>

  <section class=" section living-room room" onclick="navigateTo('pages/living.html')">
    <h2>Living Room</h2>
  </section>

  <script src="js/search.js"></script>
  <script>
    function navigateTo(url) {
      window.location.href = url;
    }

    // Show alert count badge on home page
    document.addEventListener('DOMContentLoaded', () => {
      const items = JSON.parse(localStorage.getItem('inventoryItems') || '[]');
      const CONSUMABLE = ['food', 'medicine', 'cleaning'];
      let alertCount = 0;
      items.forEach(item => {
        const qty = Number(item.qty);
        if (qty === 0) alertCount++;
        else if (qty <= 2 && CONSUMABLE.includes(item.classification)) alertCount++;
        if (item.expirationDate) {
          const days = Math.ceil((new Date(item.expirationDate) - new Date()) / 86400000);
          if (days <= 14) alertCount++;
        }
      });
      const badge = document.getElementById('home-notif-badge');
      if (badge && alertCount > 0) {
        badge.style.display = '';
        badge.textContent = alertCount + ' alert' + (alertCount !== 1 ? 's' : '') + ' — check your inventory';
      }
    });
  </script>
  <script src="js/nav.js" defer></script>
</body>
</html>
