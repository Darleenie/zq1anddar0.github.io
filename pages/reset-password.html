<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password — Home</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#121212" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main style="max-width:420px;margin:80px auto;padding:0 16px">
    <div class="modal-content" style="position:static;transform:none;padding:32px">

      <!-- Loading -->
      <div id="rp-loading" style="text-align:center;padding:20px">
        <i class="fas fa-spinner fa-spin" style="font-size:1.5rem;color:#aaa"></i>
      </div>

      <!-- Invalid / expired -->
      <div id="rp-invalid" style="display:none;text-align:center">
        <i class="fas fa-exclamation-circle" style="font-size:2rem;color:#e53935;margin-bottom:12px"></i>
        <h3 style="margin-bottom:8px">Link invalid or expired</h3>
        <p style="color:#aaa;font-size:0.9rem">Password reset links expire after 1 hour.<br>Request a new one from the Sign In screen.</p>
      </div>

      <!-- Set password form -->
      <div id="rp-form" style="display:none">
        <div class="modal-header" style="margin-bottom:20px">
          <h3><i class="fas fa-key"></i> Set New Password</h3>
        </div>
        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="At least 6 characters"
                 onkeydown="if(event.key==='Enter')submitReset()" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password"
                 onkeydown="if(event.key==='Enter')submitReset()" />
        </div>
        <div id="rp-error" class="login-error" style="display:none"></div>
        <div class="form-actions" style="margin-top:16px">
          <button class="btn-primary" style="width:100%" onclick="submitReset()">
            <i class="fas fa-check"></i> Save password
          </button>
        </div>
      </div>

      <!-- Success -->
      <div id="rp-success" style="display:none;text-align:center">
        <i class="fas fa-check-circle" style="font-size:2rem;color:#66bb6a;margin-bottom:12px"></i>
        <h3 style="margin-bottom:8px">Password saved!</h3>
        <p style="color:#aaa;font-size:0.9rem;margin-bottom:20px">You can now sign in with your new password.</p>
        <a href="/index.html" class="btn-primary" style="display:inline-block">Go home</a>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/reset-password.js"></script>
  <script src="../js/nav.js" defer></script>
</body>
</html>
